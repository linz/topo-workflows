---
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: test-hello-world-args-
  namespace: argo
spec:
  nodeSelector:
    karpenter.sh/capacity-type: 'spot'
  entrypoint: main
  arguments:
    parameters:
      - name: message
        value: 'hello world'
  templates:
    - name: main
      dag:
        tasks:
          - name: say-hello-task
            template: say-hello-template
            arguments:
              parameters:
                - name: message
                  value: '{{workflow.parameters.message}}'
    - name: say-hello-template
      inputs:
        parameters:
          - name: message
      container:
        image: '725496895483.dkr.ecr.ap-southeast-2.amazonaws.com/github/linz/topo-imagery:v3'
        command: [echo]
        args: ['{{inputs.parameters.message}}']
