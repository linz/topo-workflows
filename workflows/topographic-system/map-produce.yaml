# yaml-language-server: $schema=https://raw.githubusercontent.com/argoproj/argo-workflows/v3.6.12/api/jsonschema/schema.json

apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: topographic-map-produce
  labels:
    linz.govt.nz/category: topo-maps
    linz.govt.nz/data-type: raster
spec:
  entrypoint: main
  onExit: exit-handler
  podMetadata:
    labels:
      linz.govt.nz/category: topo-maps
      linz.govt.nz/data-type: raster
  arguments:
    parameters:
      - name: version_map_cli
        description: Version of the map produce CLI docker container to use
        value: 'latest'

      - name: version_argo_tasks
        description: Version of the Argo Tasks CLI docker container to use
        value: 'v5'

      - name: project
        description: Path or s3 of QGIS Project to use for generate map sheets.
        value: 's3://linz-topography-nonprod/qgis/nztopo50/latest/nztopo50.json'

      - name: map_sheets
        description: Map Sheet Codes to process, json array.
        value: '["AX29", "AX30", "AX31"]'

      - name: produce_all
        description: Produce all the map sheets if true.
        value: 'false'
        enum: ['true', 'false']

      - name: layout
        description: Qgis project Layout name to use for export.
        value: 'tiff-50'

      - name: map_sheet_layer
        description: Topo Map Sheet Layer name to use.
        value: 'nz_topo50_map_sheet'

      - name: data_tags
        description: Comma separated list of data tags to override existing data.
        value: ''

      - name: source
        description: Source data location that contains the data from data_tags.
        value: 's3://linz-topography-nonprod/data/catalog.json'
        enum:
          - 's3://linz-topography-nonprod/data/catalog.json'
          - 's3://linz-topography/data/catalog.json'

      - name: target
        description: Path or s3 of the target directory to write generated map sheets.
        value: 's3://linz-topography-scratch-nonprod/'
        enum:
          - 's3://linz-topography-scratch-nonprod/'
          - 's3://linz-topography-nonprod/'
          - 's3://linz-topography/'

      - name: latest
        description: Whether to push to stac with latest strategy.
        value: 'true'
        enum:
          - 'true'
          - 'false'

      - name: commit
        description: Whether to push to write the output to target bucket
        value: 'true'
        enum:
          - 'true'
          - 'false'

      - name: format
        description: Export format as pdf, tiff, or geotiff
        value: 'tiff'
        enum:
          - 'pdf'
          - 'tiff'
          - 'geotiff'

      - name: dpi
        description: DPI for export
        value: '300'

      - name: group_size
        description: Number of sheets grouped together
        value: '100'

  templates:
    - name: main
      retryStrategy:
        expression: 'false'
      dag:
        tasks:
          - name: get-location
            templateRef:
              name: tpl-get-location
              template: main

          - name: generate-map-sheets
            template: generate-map-sheets
            arguments:
              parameters:
                - name: map_sheets
                  value: '{{ workflow.parameters.map_sheets }}'

          - name: map-produce-cover
            template: map-produce-cover
            depends: generate-map-sheets && get-location
            arguments:
              parameters:
                - name: version_map_cli
                  value: '{{ workflow.parameters.version_map_cli }}'
                - name: project
                  value: '{{ workflow.parameters.project }}'
                - name: source
                  value: '{{ workflow.parameters.source }}'
                - name: map_sheets
                  value: '{{ workflow.parameters.map_sheets }}'
                - name: produce_all
                  value: '{{ workflow.parameters.produce_all }}'
                - name: layout
                  value: '{{ workflow.parameters.layout }}'
                - name: map_sheet_layer
                  value: '{{ workflow.parameters.map_sheet_layer }}'
                - name: data_tags
                  value: '{{ workflow.parameters.data_tags }}'
                - name: format
                  value: '{{ workflow.parameters.format }}'
                - name: dpi
                  value: '{{ workflow.parameters.dpi }}'
                - name: output
                  value: '{{ tasks.get-location.outputs.parameters.location }}'
              artifacts:
                - name: map-sheets-json
                  from: '{{ tasks.generate-map-sheets.outputs.artifacts.map-sheets-json }}'

          - name: group
            templateRef:
              name: tpl-at-group
              template: main
            depends: map-produce-cover
            arguments:
              parameters:
                - name: size
                  value: '{{ workflow.parameters.group_size }}'
                - name: version
                  value: '{{= workflow.parameters.version_argo_tasks }}'
              artifacts:
                - name: input
                  from: '{{ tasks.map-produce-cover.outputs.artifacts.cover-items }}'

          - name: produce
            template: produce
            depends: group && get-location
            withParam: '{{ tasks.group.outputs.parameters.output }}'
            arguments:
              parameters:
                - name: version_map_cli
                  value: '{{ workflow.parameters.version_map_cli }}'
                - name: grouped_id
                  value: '{{ item }}'
              artifacts:
                - name: grouped
                  from: '{{ tasks.group.outputs.artifacts.output }}'

          - name: stac-push
            template: stac-push
            depends: get-location && produce
            arguments:
              parameters:
                - name: version_map_cli
                  value: '{{ workflow.parameters.version_map_cli }}'
                - name: source
                  value: '{{ tasks.get-location.outputs.parameters.location }}'
                - name: target
                  value: '{{ workflow.parameters.target }}'
                - name: latest
                  value: '{{ workflow.parameters.latest }}'
                - name: commit
                  value: '{{ workflow.parameters.commit }}'

    - name: generate-map-sheets
      inputs:
        parameters:
          - name: map_sheets
      outputs:
        artifacts:
          - name: map-sheets-json
            path: /tmp/map-sheets.json
      container:
        image: alpine:latest
        command: ['sh', '-c']
        args:
          - |
            echo '{{ inputs.parameters.map_sheets }}' > /tmp/map-sheets.json

    - name: map-produce-cover
      inputs:
        parameters:
          - name: version_map_cli
          - name: project
          - name: map_sheets
          - name: produce_all
          - name: layout
          - name: map_sheet_layer
          - name: data_tags
          - name: source
          - name: format
          - name: dpi
          - name: output
        artifacts:
          - name: map-sheets-json
            path: /tmp/map-sheets.json
      outputs:
        artifacts:
          - name: cover-items
            path: /tmp/produce/cover-items.json
      container:
        image: 725496895483.dkr.ecr.ap-southeast-2.amazonaws.com/github/linz/topographic-system/map:{{ inputs.parameters.version_map_cli }}
        env:
          - name: AWS_ROLE_CONFIG_PATH
            value: s3://linz-bucket-config/config-write.topography.json
        args:
          - produce-cover
          - --project={{ inputs.parameters.project }}
          - --all={{ inputs.parameters.produce_all }}
          - --layout={{ inputs.parameters.layout }}
          - --map-sheet-layer={{ inputs.parameters.map_sheet_layer }}
          - --from-file=/tmp/map-sheets.json
          - "{{= sprig.empty(inputs.parameters.data_tags) ? '' : '--data-tags=' + inputs.parameters.data_tags }}"
          - --source={{ inputs.parameters.source }}
          - --format={{ inputs.parameters.format }}
          - --dpi={{ inputs.parameters.dpi }}
          - --output={{ inputs.parameters.output }}

    - name: produce
      inputs:
        parameters:
          - name: version_map_cli
          - name: grouped_id
        artifacts:
          - name: grouped
            path: /tmp/group/grouped/
      container:
        image: 725496895483.dkr.ecr.ap-southeast-2.amazonaws.com/github/linz/topographic-system/map:{{ inputs.parameters.version_map_cli }}
        resources:
          requests:
            memory: 7.8Gi
            cpu: 15000m
        imagePullPolicy: Always
        env:
          - name: AWS_ROLE_CONFIG_PATH
            value: s3://linz-bucket-config/config-write.topography.json
        args:
          - produce
          - --from-file={{= inputs.artifacts.grouped.path }}{{inputs.parameters.grouped_id}}.json

    - name: stac-push
      inputs:
        parameters:
          - name: version_map_cli
          - name: source
          - name: target
          - name: latest
          - name: commit
      container:
        image: 725496895483.dkr.ecr.ap-southeast-2.amazonaws.com/github/linz/topographic-system/map:{{ inputs.parameters.version_map_cli }}
        resources:
          requests:
            memory: 7.8Gi
            cpu: 15000m
        imagePullPolicy: Always
        env:
          - name: AWS_ROLE_CONFIG_PATH
            value: s3://linz-bucket-config/config-write.topography.json
        args:
          - stac-push
          - --source={{ inputs.parameters.source }}catalog.json
          - --target={{ inputs.parameters.target }}
          - --category=product
          - --strategy=date
          - '{{= inputs.parameters.latest == "true" ? "--strategy=latest" : "" }}'
          - --commit={{ inputs.parameters.commit }}

    - name: exit-handler
      retryStrategy:
        limit: '0' # `tpl-log-notification` retries itself
      steps:
        - - name: exit
            templateRef:
              name: tpl-log-notification
              template: main
            arguments:
              parameters:
                - name: workflow_status
                  value: '{{workflow.status}}'
                - name: workflow_parameters
                  value: '{{workflow.parameters}}'
