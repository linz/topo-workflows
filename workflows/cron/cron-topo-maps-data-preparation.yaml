# yaml-language-server: $schema=https://raw.githubusercontent.com/argoproj/argo-workflows/v3.6.12/api/jsonschema/schema.json
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: cron-topo-maps-data-preparation
  labels:
    linz.govt.nz/category: topo-maps
    linz.govt.nz/data-type: raster
spec:
  schedules:
    - '0 0 * * *' # 12 AM every day
  timezone: 'NZ'
  startingDeadlineSeconds: 3600 # Allow 1 hour delay if the workflow-controller clashes during the starting time.
  concurrencyPolicy: 'Allow'
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  suspend: false
  workflowSpec:
    podMetadata:
      labels:
        linz.govt.nz/category: topo-maps
        linz.govt.nz/data-type: raster
    workflowTemplateRef:
      name: topo-maps-data-preparation
    arguments:
      parameters:
        - name: 'contour'
          value: 's3://linz-topography-nonprod/data/contour/latest/collection.json'
        - name: 'landcover'
          value: 's3://linz-topography-nonprod/data/landcover/latest/collection.json'
        - name: 'output'
          value: 's3://linz-topography-nonprod/data/'
